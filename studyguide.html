<script>
var app=document.getElementById('app');

// ============ QUESTION BANKS ============

var MC_BANK=[
// Set 1
{q:"A policy analyst argues: 'We should build the new highway because the economic benefits to commuters outweigh the losses to the twelve families whose homes will be demolished.' Which concept best captures the theoretical weakness of this reasoning?",
opts:["The separateness of persons — individuals cannot be sacrificed for aggregate gains","The difference principle — the policy fails to benefit the worst off","Self-ownership — the families' property rights are violated","Alienation — the families are separated from their homes"],
ans:0,
explain:"This is the core utilitarian problem Kymlicka identifies: utilitarianism fails to respect the separateness of persons. It treats the losses of twelve families as simply outweighed by aggregate commuter gains, as though welfare can be traded across individuals like a single account."},

{q:"A student argues: 'I worked harder than everyone else, so I deserve a higher grade regardless of anyone else's situation.' Which theorist would most directly challenge the premise of this claim?",
opts:["Nozick, because the student is claiming a patterned distribution","Bentham, because individual effort does not maximize utility","Rawls, because natural talents and the capacity for effort are morally arbitrary","Marx, because the grading system constitutes exploitation"],
ans:2,
explain:"Rawls argues that even the capacity for hard work is shaped by factors beyond one's control — upbringing, temperament, social environment. The claim 'I deserve more because I worked harder' assumes effort is entirely a matter of choice, which Rawls denies."},

{q:"A libertarian argues that minimum wage laws are unjust because they prevent workers from freely accepting lower wages. Which counter-argument is most specifically Marxist?",
opts:["Minimum wage laws are justified if they benefit the least advantaged","The freedom to accept lower wages is illusory when workers have no alternative but to sell their labor to survive","Minimum wage laws maximize aggregate welfare by increasing consumer spending","Workers have a natural right to a living wage"],
ans:1,
explain:"Marx's critique of 'voluntary' exchange turns on structural coercion: when one class owns the means of production and the other owns nothing, the 'choice' to accept low wages is not genuine freedom but the only option available within a system designed to benefit owners."},

{q:"Dworkin distinguishes between 'brute luck' and 'option luck.' A person born with a genetic disability experiences:",
opts:["Option luck, because they could have purchased insurance","Brute luck, because the disability was not the result of a deliberate gamble","Neither — Dworkin's framework only applies to economic distributions","A violation of self-ownership under Nozick's framework"],
ans:1,
explain:"Brute luck is a risk that was not deliberately undertaken. A genetic disability is the paradigm case — no one chose to be born with it. Dworkin argues that a just society compensates for brute luck while holding people responsible for option luck."},

{q:"Which of the following scenarios would Nozick consider a just distribution?",
opts:["A society where the richest 1% own 90% of wealth, provided all transfers were voluntary and all original acquisitions were legitimate","A society where everyone has equal resources after a Dworkinian auction","A society where inequalities benefit the least advantaged members","A society where aggregate happiness is maximized"],
ans:0,
explain:"For Nozick, justice is entirely historical and procedural. If the process was just — legitimate acquisition and voluntary transfer — the outcome is just, regardless of how unequal it appears. No pattern of distribution is required."},

{q:"A government decides to redistribute inherited wealth through a 90% estate tax. Which theorist provides the strongest justification for this policy?",
opts:["Nozick, because inheritance violates the Lockean proviso","Rawls, because inherited wealth is morally arbitrary and concentrates unearned advantage","Bentham, because estate taxes maximize aggregate utility","Marx, because inheritance is a form of alienation"],
ans:1,
explain:"Rawls treats inherited wealth as morally arbitrary — no one earns their parents' wealth. The difference principle would permit inheritance only insofar as the resulting inequalities benefit the worst off. A 90% estate tax could be justified if it funds institutions that improve the position of the least advantaged."},

{q:"Marx argues that even well-paid workers in comfortable conditions are alienated. This is because alienation, for Marx, is fundamentally about:",
opts:["Low wages and material deprivation","The separation of workers from control over their labor, its products, their colleagues, and their human potential","The failure of the state to redistribute wealth","The absence of democratic participation in government"],
ans:1,
explain:"Alienation is not about poverty. It is a structural condition in which workers are separated from the product, the process, other workers, and their species-being. A well-paid software engineer who has no control over what she builds, how she builds it, or why — and who competes with rather than cooperates with colleagues — is alienated in Marx's sense."},

{q:"A hospital has one available organ. Patient A is a 30-year-old parent of three. Patient B is a 70-year-old retiree. A utilitarian would allocate the organ to Patient A because:",
opts:["Patient A has a right to life that supersedes Patient B's","Patient A's survival produces more aggregate welfare over a longer remaining lifespan, benefiting more dependents","Patient A's situation represents brute luck that deserves compensation","Patient A's self-ownership includes a claim on available medical resources"],
ans:1,
explain:"Utilitarianism allocates resources to maximize aggregate welfare. Patient A's longer expected lifespan and dependent children mean more total well-being is produced. This is precisely the reasoning that critics say ignores the separateness of persons — Patient B's life is treated as worth less."},

{q:"Kymlicka argues that libertarianism's weakest point is:",
opts:["Its rejection of democracy","Its theory of initial acquisition — it cannot explain how unowned resources legitimately become private property","Its reliance on the labour theory of value","Its failure to account for aggregate welfare"],
ans:1,
explain:"Kymlicka's central critique of Nozick is the acquisition problem: self-ownership tells you what to do with property you already own, but cannot justify how anyone came to own external resources in the first place. The Lockean proviso is too weak to constrain acquisition meaningfully."},

{q:"Behind Rawls's veil of ignorance, you do not know your talents, class, gender, or conception of the good life. The purpose of this ignorance is to ensure that:",
opts:["Everyone chooses utilitarian principles","No one can design principles that favour their own particular position","Everyone prioritises self-ownership","The resulting society has no inequality"],
ans:1,
explain:"The veil of ignorance is a device for ensuring impartiality. If you do not know who you will be, you cannot rig the principles in your favour. Rawls argues this leads rational agents to protect the worst-off position — because they might occupy it."},

// Set 2
{q:"A tech company offers 'flexible' contracts with no guaranteed hours. Workers can technically refuse any shift. A Marxist would argue this arrangement is exploitative because:",
opts:["The workers are not paid the market rate","The company extracts surplus value from labour performed while bearing none of the worker's survival risk","The arrangement violates the Lockean proviso","The workers' preferences are illegitimate"],
ans:1,
explain:"The zero-hours contract is a contemporary form of what Marx describes: the worker 'freely' accepts terms dictated by structural necessity. The company captures surplus value while externalizing all risk onto the worker, who must accept whatever is offered because the alternative is no income at all."},

{q:"Rawls's difference principle permits economic inequality only when:",
opts:["The majority of citizens vote in favour of it","It results from voluntary exchange between consenting parties","It benefits the least advantaged members of society","It maximizes aggregate utility across the population"],
ans:2,
explain:"The difference principle is Rawls's second principle of justice: social and economic inequalities are permitted only if they are to the greatest benefit of the least advantaged. This is what distinguishes Rawls from both utilitarians (who maximize the average) and libertarians (who permit any outcome of just process)."},

{q:"Dworkin's insurance market thought experiment is designed to solve a problem that Rawls's difference principle cannot. That problem is:",
opts:["How to prevent the state from becoming tyrannical","How to distinguish between inequalities arising from choices people make and inequalities arising from circumstances they did not choose","How to justify initial acquisition of property","How to calculate aggregate utility without illegitimate preferences"],
ans:1,
explain:"Rawls's difference principle does not distinguish between people who are worst off due to bad luck and those who are worst off due to their own choices. Dworkin's insurance market addresses this: rational agents would insure against brute luck (disabilities, unearned disadvantages) but not against the consequences of their own calculated gambles."},

{q:"A country allows private companies to own all water sources. Citizens must purchase water at market rates. Several families cannot afford clean water. A libertarian would say:",
opts:["The state should redistribute water to ensure equal access","The arrangement is just if the water sources were legitimately acquired and all purchases are voluntary","The arrangement maximizes aggregate welfare and is therefore justified","The families' alienation from a basic resource violates their species-being"],
ans:1,
explain:"For Nozick, if the property was legitimately acquired and no one was coerced, the distribution is just — even if some cannot afford a basic necessity. This is one of the 'morally intolerable conclusions' Kymlicka argues libertarianism produces."},

{q:"Marx's concept of 'species-being' refers to:",
opts:["The biological classification of humans as a species","The human capacity for creative, purposeful, cooperative labor as the defining feature of human nature","The tendency of capitalism to treat workers like animals","The Darwinian struggle for survival within capitalist markets"],
ans:1,
explain:"Species-being (Gattungswesen) is Marx's term for what makes humans distinctively human: the capacity to transform the world through conscious, creative, cooperative activity. Alienation from species-being means capitalism reduces this capacity to mere survival — working only to eat and pay rent."},

{q:"Kymlicka presents the 'egalitarian plateau' as:",
opts:["A specific policy proposal for wealth redistribution","The shared assumption across modern political theories that citizens deserve equal concern and respect","Marx's term for the communist ideal of a classless society","Nozick's argument that formal equality under law is sufficient for justice"],
ans:1,
explain:"The egalitarian plateau is Kymlicka's organizing concept: every theory he examines — utilitarian, liberal egalitarian, libertarian, Marxist — claims to treat people as equals. They disagree on what equal treatment requires, but they share the foundational commitment. This is what makes their disagreements so deep."},

{q:"A student receives a scholarship because her parents are wealthy alumni donors. Under Rawls's framework, this is problematic because:",
opts:["It violates the student's self-ownership","It does not maximize aggregate utility","Family wealth is morally arbitrary and the scholarship was not awarded under conditions of fair equality of opportunity","It constitutes exploitation of other applicants' surplus labour"],
ans:2,
explain:"Rawls's principle of fair equality of opportunity requires that positions be open to all under conditions where social background does not determine access. A legacy scholarship violates this because it rewards morally arbitrary family connections rather than talent or effort."},

{q:"Nozick's 'Wilt Chamberlain' example begins by assuming any distribution the reader considers just. The purpose of this starting point is to show that:",
opts:["Chamberlain deserves his earnings because he is talented","Even a perfectly just starting distribution will be disrupted by free exchanges, proving that maintaining any pattern requires coercion","Market outcomes are always more efficient than planned distributions","The difference principle inevitably collapses into utilitarianism"],
ans:1,
explain:"The genius of the argument is its generality: whatever pattern of distribution you prefer — egalitarian, Rawlsian, utilitarian — voluntary exchanges will disrupt it. To restore the pattern, you must continuously interfere with people's free choices. Liberty upsets patterns."},

{q:"A utilitarian policy analyst proposes allocating healthcare funding based on Quality-Adjusted Life Years (QALYs) — giving priority to treatments that produce the most healthy years per dollar spent. The strongest Rawlsian objection to this approach would be:",
opts:["It violates self-ownership by telling people which treatments they can receive","It treats the severely ill and disabled as worth less investment because their QALY gains are smaller, thereby failing to prioritize the worst off","It ignores the Lockean proviso on resource acquisition","It creates alienation among healthcare workers"],
ans:1,
explain:"QALY-based allocation systematically disadvantages those with severe conditions or disabilities because their potential QALY gains are smaller. Rawls would object that this fails the difference principle: rather than prioritizing the position of the worst off, it directs resources toward those who are already healthier and can show bigger statistical gains."},

{q:"Marx distinguishes his critique from a moral complaint about unfair wages. For Marx, exploitation is:",
opts:["A moral judgement about greed","A structural feature of capitalism in which surplus value is extracted from workers even when wages are fair by market standards","A temporary condition that can be resolved by raising the minimum wage","A psychological experience of feeling undervalued at work"],
ans:1,
explain:"This is the key to understanding Marx's radicalism: exploitation is not about bad employers or low wages. It is a structural description of how capitalism works. Even at 'fair' wages, the worker produces more value than she receives. The surplus flows to the owner. This is not a bug — it is the system's operating logic."},

// Set 3
{q:"A city government uses an algorithm to determine which neighborhoods receive public investment, optimizing for maximum economic return. A utilitarian would support this if:",
opts:["The algorithm respects each neighborhood's self-ownership of its resources","The algorithm's allocations produce the greatest aggregate welfare across the city","The algorithm ensures the worst-off neighborhoods receive the most investment","The algorithm eliminates alienation among urban workers"],
ans:1,
explain:"Utilitarianism directs resources where they produce the most aggregate benefit. An algorithm optimizing for economic return is essentially a utility calculator. The utilitarian objection would arise only if the algorithm failed to count all affected preferences equally — for instance, by ignoring non-economic welfare."},

{q:"Dworkin argues that a just society would allow people to purchase insurance against being born with disabilities. This thought experiment establishes that:",
opts:["Disability is always a matter of option luck","The market is the best mechanism for distributing healthcare","Society owes compensation for brute-luck disadvantages, at a level rational agents would have insured against","Self-ownership includes the right to refuse insurance"],
ans:2,
explain:"The insurance market is Dworkin's device for determining how much compensation brute-luck disadvantages deserve. Since no one would choose to be uninsured against severe disability, rational agents behind something like a veil would purchase coverage. The premium they would pay establishes the appropriate level of social compensation."},

{q:"A country requires all citizens to perform two years of national service. Nozick would object to this policy primarily because:",
opts:["It does not maximize aggregate welfare","It violates self-ownership by compelling individuals to labour for the state without consent","It fails the envy test","It creates alienation from the process of production"],
ans:1,
explain:"Compulsory national service is forced labour in Nozick's framework. If you own yourself, you own your labour. Compelling someone to work — even for the community's benefit — is a violation of self-ownership equivalent to partial slavery. This applies even if the service is 'for the common good.'"},

{q:"A feminist critic argues that Rawls's veil of ignorance fails because it assumes the family is a just institution. This criticism suggests that:",
opts:["Rawls's theory is secretly utilitarian","The original position should also question whether the gendered division of domestic labor is just, rather than treating the family as outside the scope of justice","Rawls's theory is identical to Nozick's","The veil of ignorance makes people too risk-averse"],
ans:1,
explain:"This anticipates the feminist critique we will study later: Rawls brackets the family as a 'basic institution' but does not subject it to the same principles of justice he applies to economic and political institutions. If the family distributes burdens unequally by gender, Rawls's framework cannot see it."},

{q:"Marx would argue that Rawls's difference principle, even if perfectly implemented, would still be inadequate because:",
opts:["It does not maximize aggregate utility","It still operates within a capitalist framework where one class owns the means of production and another must sell its labor","It violates self-ownership","It ignores the Lockean proviso"],
ans:1,
explain:"For Marx, redistribution within capitalism is rearranging deck chairs. The difference principle might improve the material condition of the worst off, but it leaves the fundamental structure intact: private ownership of the means of production, wage labor, and the extraction of surplus value. The problem is the system, not the distribution."},

{q:"Kymlicka identifies the 'separateness of persons' as the fundamental objection to utilitarianism. This objection means:",
opts:["People are physically separate and cannot share experiences","Utilitarianism treats society as a single entity whose aggregate welfare can be maximized, ignoring that gains to some do not compensate losses to others","People have separate property rights that cannot be violated","Different persons hold separate and incompatible moral theories"],
ans:1,
explain:"The separateness of persons means that welfare cannot be traded across individuals as though society were one big account. If you take from one person and give to another, the gainer's happiness does not cancel the loser's suffering. They are separate beings with separate lives. Utilitarianism's aggregation obscures this."},

{q:"A worker in a cooperative owns an equal share of the business, participates in decisions about production, and keeps a proportional share of the profits. Marx would say this worker experiences:",
opts:["Full exploitation because she still operates within a market economy","Significantly reduced alienation because she controls the product, the process, and her relationship with co-workers","The same alienation as any other worker because alienation is a psychological state","A violation of self-ownership because collective ownership restricts individual freedom"],
ans:1,
explain:"A worker-owned cooperative addresses three of Marx's four dimensions of alienation directly: the worker owns the product, controls the process, and cooperates with rather than competes against fellow workers. Whether it fully resolves alienation from species-being depends on whether the work itself is creative and fulfilling."},

{q:"Nozick argues that Robert Nozick argues that the minimal state — limited to protection against force, theft, and fraud — is the only justified form of government. Any state that does more than this is unjust because:",
opts:["Larger states cannot maximize aggregate welfare efficiently","Any function beyond protection requires taxation, which violates self-ownership by compelling citizens to labour for purposes they did not consent to","The difference principle only applies within minimal states","Alienation increases as government grows"],
ans:1,
explain:"The night-watchman state follows directly from self-ownership. If you own yourself and your labour, no one — including the state — can take what you produce without consent. Taxation for public education, healthcare, or welfare compels you to work for others' benefit, which Nozick equates with forced labour."},

{q:"Rawls argues that the veil of ignorance would lead rational agents to reject utilitarianism because:",
opts:["Utilitarianism requires too much information to calculate","Behind the veil, you might end up as the person whose rights are sacrificed for the greater good, making the utilitarian gamble irrational","Utilitarianism violates self-ownership","Utilitarianism is incompatible with the labour theory of value"],
ans:1,
explain:"Behind the veil, you do not know whether you will be a beneficiary or a victim of utilitarian calculations. Since you could be the one sacrificed for aggregate gains, the rational strategy is to reject utilitarianism in favor of principles that protect the worst-off position — which is Rawls's maximin argument."},

{q:"Dworkin's auction begins with equal resources (clamshells) for all participants. The philosophical purpose of starting with equality is to ensure that:",
opts:["Everyone ends up with identical bundles of goods","Any resulting inequality reflects differences in people's choices and ambitions rather than differences in their starting positions","The state maintains a permanent pattern of equal distribution","No one can acquire private property"],
ans:1,
explain:"Equal starting resources ensure that the auction's outcome is ambition-sensitive and endowment-insensitive. If you end up with a different bundle than someone else, it is because you valued different things — not because you started with more. This is Dworkin's solution to the problem of distinguishing choice from circumstance."}
];

var RECOG_BANK=[
{passage:"The fundamental question of political morality is not 'what do people deserve?' but 'what arrangements produce the most satisfaction?' If we must choose between a policy that makes ten thousand people slightly happier and one that makes one hundred people significantly happier, the answer is straightforward: count the total. Every person's pleasure counts equally, and the right action is whichever one produces the greatest sum.",
theory:"Utilitarianism",
concept:"Maximizing aggregate welfare with equal counting of preferences",
explain:"The passage focuses on total satisfaction, counting every person's pleasure equally, and choosing based on the greatest aggregate sum. The phrase 'every person's pleasure counts equally' signals utilitarian equal consideration, while the willingness to sacrifice the intensity of some for the breadth of others reflects the aggregation logic that Kymlicka identifies as utilitarianism's core commitment."},

{passage:"No one chose to be born into poverty. No one earned their genetic advantages. The circumstances of your birth — your family's wealth, your natural health, your cognitive abilities — are the result of a lottery you never entered. Justice demands that we design institutions as if we did not know which ticket we held.",
theory:"Liberal Egalitarianism (Rawls)",
concept:"Moral arbitrariness of natural and social endowments; the veil of ignorance",
explain:"The emphasis on the unchosen nature of birth circumstances and the metaphor of a lottery directly invoke Rawls's argument that natural talents and social position are morally arbitrary. The concluding line — 'as if we did not know which ticket we held' — is a restatement of the veil of ignorance thought experiment."},

{passage:"When they tell you that you are free to leave your job, ask yourself: free to go where? Every workplace is owned by someone else. Every alternative requires you to sell your time, your energy, your creativity to another owner. The 'freedom' to choose your employer is the freedom to choose which master profits from your existence.",
theory:"Marxism",
concept:"Structural coercion within voluntary exchange; critique of formal freedom",
explain:"The passage exposes the Marxist distinction between formal and substantive freedom. The worker is legally free but structurally coerced — all means of production are privately owned, so 'choice' means only selecting among employers, not whether to sell one's labor at all. The word 'master' signals Marx's equation of wage labor with a modern form of servitude."},

{passage:"If you build a house with your own hands on land that no one has claimed, the house is yours. If you trade it for a boat someone else built, the boat is yours. At no point in this chain did anyone take from anyone else without consent. The resulting distribution — however unequal — is as just as the process that produced it.",
theory:"Libertarianism (Nozick)",
concept:"Entitlement theory — just acquisition and just transfer",
explain:"The passage traces Nozick's three-principle framework: just acquisition (building on unclaimed land), just transfer (voluntary exchange), and the conclusion that procedural justice determines distributive justice. The explicit statement that inequality is irrelevant if the process was fair is the hallmark of Nozick's historical theory."},

{passage:"We measure progress by growth — more goods, more output, more consumption. But what about the person who made those goods? She arrives at the factory before dawn. She performs the same motion ten thousand times. She never sees the finished product. She does not choose the pace or the method. At the end of the day, she is not more human for her labour. She is less.",
theory:"Marxism",
concept:"Alienation from the product and the process of production",
explain:"The passage describes two of Marx's four alienation dimensions: separation from the product ('never sees the finished product') and separation from the process ('does not choose the pace or the method'). The final line — 'not more human but less' — invokes alienation from species-being, the idea that capitalism degrades rather than develops human potential."},

{passage:"Imagine you could design a society from scratch, knowing nothing about who you would be within it. Would you gamble on a system that might make you fabulously wealthy — but might also leave you destitute with no safety net? Or would you insist on a floor below which no one can fall, even if it means capping the ceiling?",
theory:"Liberal Egalitarianism (Rawls)",
concept:"The original position and maximin strategy",
explain:"The passage directly describes the veil of ignorance scenario and the choice between gambling (which might favor utilitarianism or libertarianism) and securing a minimum floor (Rawls's maximin). The language of 'floor' and 'ceiling' maps onto the difference principle — tolerating inequality only when it raises the floor."},

{passage:"Every semester, students compete for grades on a curve. Helping a classmate understand the material could lower your own mark. The system has made cooperation irrational and competition compulsory. You did not choose this arrangement. But it shapes every interaction you have.",
theory:"Marxism",
concept:"Alienation from other workers — competition replacing solidarity",
explain:"The passage describes Marx's third dimension of alienation: structural competition replacing natural cooperation. The students, like workers, are placed in a system that makes mutual aid irrational. The key Marxist insight is in the final line: the arrangement was not chosen but shapes all relationships — it is structural, not personal."},

{passage:"The question is not whether some people end up with more than others. The question is whether the route from A to B involved force or fraud. If every step was consensual — every trade willing, every gift freely given, every inheritance accepted — then the destination is legitimate, full stop.",
theory:"Libertarianism (Nozick)",
concept:"Historical justice — process determines legitimacy regardless of outcome",
explain:"The emphasis on process over outcome, the enumeration of legitimate means (trade, gift, inheritance), and the dismissal of distributional patterns ('full stop') mark this as Nozick's entitlement theory. The passage explicitly rejects the relevance of inequality if procedural justice was maintained."},

{passage:"The greatest happiness of the greatest number — this is the foundation of morals and legislation. Each person counts for one, and no person counts for more than one. The pain of a king weighs no heavier than the pain of a peasant. We simply add up the total and choose the path that yields the most.",
theory:"Utilitarianism",

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function pick(bank,used,n){
var available=[];
for(var i=0;i<bank.length;i++){if(used.indexOf(i)===-1)available.push(i);}
if(available.length<n){used.length=0;available=[];for(var i=0;i<bank.length;i++)available.push(i);}
var picked=shuffle(available).slice(0,n);
for(var i=0;i<picked.length;i++)used.push(picked[i]);
return picked;
}

// ============ MOCK EXAM ============
function startMock(){
mode='mock';mockSection=0;mockQ=0;timeLeft=7200;
mockAnswers={s1:pick(MC_BANK,usedMC,10),s2:pick(RECOG_BANK,usedRecog,4),s3:pick(SCENARIO_BANK,usedScen,2),s4:pick(CONFRONT_BANK,usedConf,1),s5:pick(SYNTHESIS_BANK,usedSynth,1)};
mockAnswers.s1score=0;
mockAnswers.s1responses=[];
mockAnswers.s2responses=[];
mockAnswers.s3responses=[];
mockAnswers.s4response='';
mockAnswers.s5response='';
startTimer();
showMockSection();
}

function startTimer(){
clearTimer();
timerInterval=setInterval(function(){
timeLeft--;
if(timeLeft<=0){clearTimer();showMockResults();}
var m=Math.floor(timeLeft/60);
var s=timeLeft%60;
var el=document.getElementById('timer');
if(el)el.textContent='Time Remaining: '+m+':'+(s<10?'0':'')+s;
},1000);
}

function clearTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}

function showMockSection(){
var m=Math.floor(timeLeft/60);
var s=timeLeft%60;
var timerHtml='<div class="timer" id="timer">Time Remaining: '+m+':'+(s<10?'0':'')+s+'</div>';

if(mockSection===0){showMockMC(timerHtml);}
else if(mockSection===1){showMockRecog(timerHtml);}
else if(mockSection===2){showMockScenario(timerHtml);}
else if(mockSection===3){showMockConfront(timerHtml);}
else if(mockSection===4){showMockSynth(timerHtml);}
else{clearTimer();showMockResults();}
}

function showMockMC(timerHtml){
var idx=mockAnswers.s1[mockQ];
var q=MC_BANK[idx];
app.innerHTML=timerHtml+'<div style="margin-top:50px;">'+
'<p class="sub">SECTION 1 — Conceptual Distinctions — Question '+(mockQ+1)+' of 10</p>'+
'<p><strong>'+q.q+'</strong></p>';
for(var i=0;i<q.opts.length;i++){
app.innerHTML+='<button class="opt" id="mopt'+i+'" onclick="mockMCAnswer('+i+','+idx+')">('+String.fromCharCode(97+i)+') '+q.opts[i]+'</button>';
}
app.innerHTML+='</div>';
}

function mockMCAnswer(chosen,idx){
var q=MC_BANK[idx];
if(chosen===q.ans)mockAnswers.s1score++;
mockAnswers.s1responses.push({idx:idx,chosen:chosen,correct:q.ans});
mockQ++;
if(mockQ>=10){mockSection=1;mockQ=0;showMockSection();}
else{showMockMC('<div class="timer" id="timer">'+document.getElementById('timer').textContent+'</div>');}
}

function showMockRecog(timerHtml){
var idx=mockAnswers.s2[mockQ];
var r=RECOG_BANK[idx];
app.innerHTML=timerHtml+'<div style="margin-top:50px;">'+
'<p class="sub">SECTION 2 — Theoretical Recognition — Passage '+(mockQ+1)+' of 4</p>'+
'<div class="card"><p style="font-style:italic;">'+r.passage+'</p></div>'+
'<textarea id="mockRecog" placeholder="Identify the theory, concept, and explain..."></textarea>'+
'<button class="btn-p" onclick="saveMockRecog()">Next</button></div>';
}

function saveMockRecog(){
mockAnswers.s2responses.push({idx:mockAnswers.s2[mockQ],answer:document.getElementById('mockRecog').value});
mockQ++;
if(mockQ>=4){mockSection=2;mockQ=0;showMockSection();}
else{showMockRecog('<div class="timer" id="timer">'+document.getElementById('timer').textContent+'</div>');}
}

function showMockScenario(timerHtml){
var idx=mockAnswers.s3[mockQ];
var s=SCENARIO_BANK[idx];
app.innerHTML=timerHtml+'<div style="margin-top:50px;">'+
'<p class="sub">SECTION 3 — Applied Analysis — Scenario '+(mockQ+1)+' of 2</p>'+
'<p><strong>Apply '+s.theory+':</strong></p>'+
'<div class="card"><p>'+s.scenario+'</p></div>'+
'<textarea id="mockScen" placeholder="Write your analysis..." style="min-height:200px;"></textarea>'+
'<button class="btn-p" onclick="saveMockScenario()">Next</button></div>';
}

function saveMockScenario(){
mockAnswers.s3responses.push({idx:mockAnswers.s3[mockQ],answer:document.getElementById('mockScen').value});
mockQ++;
if(mockQ>=2){mockSection=3;mockQ=0;showMockSection();}
else{showMockScenario('<div class="timer" id="timer">'+document.getElementById('timer').textContent+'</div>');}
}

function showMockConfront(timerHtml){
var idx=mockAnswers.s4[0];
var c=CONFRONT_BANK[idx];
app.innerHTML=timerHtml+'<div style="margin-top:50px;">'+
'<p class="sub">SECTION 4 — Theoretical Confrontation</p>'+
'<p class="sub">'+c.title+'</p>'+
'<div class="card"><p>'+c.prompt+'</p></div>'+
'<textarea id="mockConf" placeholder="Write your confrontation..." style="min-height:250px;"></textarea>'+
'<button class="btn-p" onclick="saveMockConfront()">Next</button></div>';
}

function saveMockConfront(){
mockAnswers.s4response=document.getElementById('mockConf').value;
mockSection=4;showMockSection();
}

function showMockSynth(timerHtml){
var idx=mockAnswers.s5[0];
var s=SYNTHESIS_BANK[idx];
app.innerHTML=timerHtml+'<div style="margin-top:50px;">'+
'<p class="sub">SECTION 5 — Synthesis and the Egalitarian Plateau</p>'+
'<div class="card"><p>'+s.prompt+'</p></div>'+
'<textarea id="mockSynth" placeholder="Write your synthesis essay..." style="min-height:300px;"></textarea>'+
'<button class="btn-p" onclick="saveMockSynth()">Submit Exam</button></div>';
}

function saveMockSynth(){
mockAnswers.s5response=document.getElementById('mockSynth').value;
mockSection=5;clearTimer();showMockResults();
}

function showMockResults(){
var elapsed=7200-timeLeft;
var em=Math.floor(elapsed/60);
var es=elapsed%60;

var html='<h1>Mock Exam Complete</h1>'+
'<p class="sub">Time used: '+em+' minutes '+es+' seconds</p>';

// Section 1 results
var s1pct=Math.round((mockAnswers.s1score/10)*100);
var s1col=s1pct>=70?'#22c55e':s1pct>=50?'#eab308':'#b91c1c';
html+='<h2>Section 1: Conceptual Distinctions</h2>'+
'<div class="card"><p><strong>Score: '+mockAnswers.s1score+'/10 ('+s1pct+'%)</strong></p>'+
'<div class="score-bar"><div class="score-fill" style="width:'+s1pct+'%;background:'+s1col+'">'+s1pct+'%</div></div></div>';

for(var i=0;i<mockAnswers.s1responses.length;i++){
var r=mockAnswers.s1responses[i];
var q=MC_BANK[r.idx];
var icon=r.chosen===r.correct?'<span class="green">✓</span>':'<span class="red">✗</span>';
html+='<p>'+icon+' Q'+(i+1)+': You chose ('+String.fromCharCode(97+r.chosen)+'), correct was ('+String.fromCharCode(97+r.correct)+')</p>';
if(r.chosen!==r.correct)html+='<p class="sub" style="margin-left:20px;">'+q.explain+'</p>';
}

// Sections 2-5 with model answers
html+='<h2>Section 2: Theoretical Recognition</h2>';
for(var i=0;i<mockAnswers.s2responses.length;i++){
var r=mockAnswers.s2responses[i];
var rec=RECOG_BANK[r.idx];
html+='<div class="card"><p><strong>Passage '+(i+1)+':</strong> <em>"'+rec.passage.substring(0,80)+'..."</em></p>'+
'<p><strong>Your answer:</strong> '+(r.answer||'(blank)')+'</p></div>'+
'<div class="model"><p><strong>Theory:</strong> '+rec.theory+' | <strong>Concept:</strong> '+rec.concept+'</p><p>'+rec.explain+'</p></div>';
}

html+='<h2>Section 3: Applied Analysis</h2>';
for(var i=0;i<mockAnswers.s3responses.length;i++){
var r=mockAnswers.s3responses[i];
var sc=SCENARIO_BANK[r.idx];
html+='<div class="card"><p><strong>'+sc.theory+'</strong></p><p><strong>Your answer:</strong> '+(r.answer||'(blank)')+'</p></div>'+
'<div class="model"><h3>Model Answer</h3><p>'+sc.model+'</p></div>';
}

html+='<h2>Section 4: Theoretical Confrontation</h2>';
var c=CONFRONT_BANK[mockAnswers.s4[0]];
html+='<div class="card"><p><strong>'+c.title+'</strong></p><p><strong>Your answer:</strong> '+(mockAnswers.s4response||'(blank)')+'</p></div>'+
'<div class="model"><h3>Model Answer</h3><p>'+c.model+'</p></div>';

html+='<h2>Section 5: Synthesis</h2>';
var sy=SYNTHESIS_BANK[mockAnswers.s5[0]];
html+='<div class="card"><p><strong>Your answer:</strong> '+(mockAnswers.s5response||'(blank)')+'</p></div>'+
'<div class="model"><h3>Model Answer</h3><p>'+sy.model+'</p></div>';

html+='<button class="btn-p" onclick="startMock()">Take Another Mock Exam</button>'+
'<button class="btn-s" onclick="showHome()">Back to Menu</button>';

app.innerHTML=html;
}

showHome();
</script>
